<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Group Ironman Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="https://static.runelite.net/cache/item/icon/12810.png">
</head>
<body>

  <!-- Login -->
  <div id="login-view" class="view">
    <div class="login-wrap">
      <form id="login-form" class="login-card" autocomplete="off">
        <h1>Group Ironman Tracker</h1>
        <p class="muted">Enter your group name and access token to view your group's items.</p>
        <label>
          <span class="field-label">
            Group name
            <span class="info" tabindex="0" aria-label="Group name help">i
              <span class="tip" role="tooltip">The name of your group, exactly as created on groupiron.men. Case-sensitive.</span>
            </span>
          </span>
          <input id="login-group" type="text" placeholder="Group" required>
        </label>
        <label>
          <span class="field-label">
            Access token
            <span class="info" tabindex="0" aria-label="Access token help">i
              <span class="tip" role="tooltip">The private token generated for your group on groupiron.men (a UUID like xxxxxxxx-xxxx-…). It stays in your browser and is only sent to groupiron.men.</span>
            </span>
          </span>
          <input id="login-token" type="password" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required>
        </label>
        <button type="submit" id="login-btn">Connect</button>
        <p id="login-error" class="error hidden"></p>
      </form>

      <footer class="login-footer">
        <a class="gh-btn" href="https://github.com/koorhonen/OSRSGroupPage" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
          View on GitHub
        </a>
        <p class="credits muted">
          Powered by the <a href="https://github.com/christoabrown/group-ironmen" target="_blank" rel="noopener">group-ironmen</a>
          project and its <a href="https://groupiron.men" target="_blank" rel="noopener">groupiron.men</a> API.
          Item icons from <a href="https://runelite.net" target="_blank" rel="noopener">RuneLite</a>.
        </p>
        <p class="credits muted">Not affiliated with Jagex. Old School RuneScape is a trademark of Jagex Ltd.</p>
      </footer>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="app-view" class="view hidden">
    <header class="topbar">
      <div class="brand">
        <h1 id="group-title"></h1>
        <span id="sync-status" class="sync"><span class="dot"></span><span id="sync-text">Connecting</span></span>
      </div>
      <input id="global-search" type="search" placeholder="Search items across all players…">
      <button id="logout-btn" class="ghost">Log out</button>
    </header>

    <nav id="member-tabs" class="tabs"></nav>

    <main id="member-content"></main>

    <main id="search-content" class="hidden"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
